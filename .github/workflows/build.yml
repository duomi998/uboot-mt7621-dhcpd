name: Build u-boot by board

on:
  workflow_dispatch:
    inputs:
      model:
        description: '设备型号'
        required: true
        type: string
        default: 'zte_e8820s'
      warninginfo:
        description: '警告信息：
            这些来自自动化迁移的配置文件[configs-mt7621](https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/tree/main/configs-mt7621)**并不可信**，
            编译之前请**务必检查**它们是否适合你的设备！
            在使用之前请查看 [README](https://github.com/Yuzhii0718/uboot-mt7621-dhcpd/blob/main/README.md)!
            否则**有变砖的风险，自行承担**！'
        required: false
        type: boolean
        default: false
      warning:
        description: '我已阅读 README 以及警告信息，并自行承担风险！'
        required: true
        type: boolean
        default: false
      confirm:
        description: '我没有确认警告信息，只是闭眼选中了所有的复选框，请关闭这个工作流！'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: Build MT7621 u-boot
    runs-on: ubuntu-22.04
    strategy:
       fail-fast: False

    steps:
      - name: make sure the user has confirmed the warning
        if: ${{ !inputs.warning || !inputs.warninginfo }}
        run: |
          echo "Please confirm the warning before running this workflow."
          exit 1

      - name: make sure the user has confirmed the warning info not being trustworthy
        if: ${{ inputs.confirm }}
        run: |
          echo "Please confirm that you have read the warning info before running this workflow."
          exit 1

      - name: Checkout master directory
        uses: actions/checkout@v4
        with:
          path: uboot-mt7621

      - name: Install essential packages
        run: |
          sudo apt-get update
          sudo apt-get install swig python2-dev
          echo 'switch to python2 as default'
          sudo rm /usr/bin/python
          sudo ln -s /usr/bin/python2 /usr/bin/python

      - name: Download OpenWrt toolchain
        run: |
          wget -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar --xz -xf -

      - name: Compile
        working-directory: uboot-mt7621
        run: |
          mkdir -p archive
          BOARD=${{ inputs.model }} ./build.sh | tee "archive/${{ inputs.model }}-build.log"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.model }}-uboot
          path: "uboot-mt7621/archive/"
      
      - name: Generate timestamp
        id: timestamp
        run: echo "now=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: rename uboot-mt7621
        run: |
          for file in uboot-mt7621/archive/*; do
            filename=$(basename "$file")
            extension="${filename##*.}"
            name="${filename%.*}"
            mv "$file" "uboot-mt7621/archive/${name}-${{ steps.timestamp.outputs.now }}.${extension}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: BOARD-${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
          body: |
            ## 构建参数
            - 设备型号: ${{ inputs.model }}
          files: uboot-mt7621/archive/*
          tag_name: ${{ inputs.model }}-${{ steps.timestamp.outputs.now }}
